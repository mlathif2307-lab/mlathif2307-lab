name: Auto Update Skills README
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch and Update Skills
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python << 'PYEOF'
          import requests
          import re
          import os

          token = os.environ.get('GH_TOKEN', '')
          headers = {'Authorization': f'token {token}'}

          response = requests.get(
              'https://api.github.com/users/mlathif2307-lab/repos',
              headers=headers
          ).json()

          languages = set()
          for repo in response:
              if isinstance(repo, dict) and repo.get('language'):
                  languages.add(repo['language'])

          detected = list(languages)
          if 'HTML' in detected or 'CSS' in detected:
              if 'JavaScript' not in detected:
                  detected.append('JavaScript')

          tech_stack = ', '.join(sorted(detected)) if detected else 'Python, C++, HTML, CSS, JavaScript'
          print(f'Detected languages: {tech_stack}')

          with open('README.md', 'r') as f:
              content = f.read()

          new_line = f'- **Languages & Web:** {tech_stack}'
          updated = re.sub(r'-\s+\*\*Languages & Web:\*\*.*', new_line, content)

          with open('README.md', 'w') as f:
              f.write(updated)
          PYEOF

      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mlathif2307-lab/mlathif2307-lab.git
          git add README.md
          git diff --staged --quiet || (git commit -m 'auto: update languages tech stack' && git push)
