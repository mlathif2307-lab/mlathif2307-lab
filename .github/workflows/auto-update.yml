*(Ketik tanda garis miring `/` secara manual agar sistem GitHub otomatis membuatkan struktur foldernya).*

4. Salin (*copy*) seluruh kode konfigurasi di bawah ini secara utuh:

```yaml
name: Auto Update Skills README

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Profil
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch and Update Skills
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python -c "
          import requests
          import re

          headers = {'Authorization': f'token {chr(123)}{chr(125)}'.format('$GH_TOKEN')}
          response = requests.get('https://api.github.com/users/mlathif2307-lab/repos', headers=headers).json()
          
          languages = set()
          for repo in response:
              if isinstance(repo, dict) and repo.get('language'):
                  languages.add(repo['language'])
          
          detected = list(languages)
          if 'HTML' in detected or 'CSS' in detected:
              if 'JavaScript' not in detected:
                  detected.append('JavaScript')
          
          tech_stack = ', '.join(sorted(detected)) if detected else 'Python, C++, HTML, CSS, JavaScript'
          print(f'Detected languages: {tech_stack}')

          with open('README.md', 'r') as file:
              content = file.read()

          new_line = f'- **Languages & Web:** {tech_stack}'
          updated_content = re.sub(r'-\s\*\*Languages & Web:\*\*.*', new_line, content)

          with open('README.md', 'w') as file:
              file.write(updated_content)
          "

      - name: Commit & Push Perubahan ke Profil
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m '🤖 auto: update languages tech stack' && git push)
